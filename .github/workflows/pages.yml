name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22.18.0
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0

      - name: Verify Pages workflow contract
        run: |
          node scripts/sync-runtime-cache-keys.mjs --check
          bash scripts/test-pages-workflow.sh

      - name: Verify Pages release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_tag="$(gh release view --json tagName -q '.tagName' 2>/dev/null || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)"
          fi
          if [[ -z "${latest_tag}" ]]; then
            exit 0
          fi

          git fetch --no-tags --force --depth=1 origin "refs/tags/${latest_tag}:refs/tags/${latest_tag}"

          pages_release_plan_paths_file="$(mktemp)"
          if ! node scripts/print-press-system-surface.mjs pages-release-plan-paths > "${pages_release_plan_paths_file}"; then
            echo "Failed to read Press system Pages release-plan paths" >&2
            exit 1
          fi
          pages_release_plan_paths=()
          while IFS= read -r pages_release_plan_path; do
            pages_release_plan_paths+=("${pages_release_plan_path}")
          done < "${pages_release_plan_paths_file}"
          if [[ "${#pages_release_plan_paths[@]}" -eq 0 ]]; then
            echo "Press system Pages release-plan path list is empty" >&2
            exit 1
          fi
          changed_system_files="$(git diff --name-only "${latest_tag}..HEAD" -- "${pages_release_plan_paths[@]}")"
          if [[ -z "${changed_system_files}" ]]; then
            echo "No unreleased Press system surface changes; Pages can reuse ${latest_tag}."
            exit 0
          fi

          source_tag="$(node -e "const manifest = require('./assets/press-system.json'); const version = String(manifest.version || '').trim(); const tag = String(manifest.tag || '').trim(); if (!/^\\d+\\.\\d+\\.\\d+$/.test(version) || tag !== \`v\${version}\`) { throw new Error('assets/press-system.json must declare matching version and tag'); } process.stdout.write(tag);")"
          export LATEST_TAG="${latest_tag}"
          export NEXT_TAG="${source_tag}"
          node -e "function parse(tag) { const match = String(tag || '').match(/^v(\\d+)\\.(\\d+)\\.(\\d+)$/); if (!match) throw new Error(\`invalid release tag: \${tag}\`); return match.slice(1).map(Number); } const latest = parse(process.env.LATEST_TAG); const next = parse(process.env.NEXT_TAG); for (let i = 0; i < 3; i += 1) { if (next[i] > latest[i]) process.exit(0); if (next[i] < latest[i]) break; } throw new Error(\`Pages deploy cache key \${process.env.NEXT_TAG} must be greater than latest release \${process.env.LATEST_TAG}\`);"

      - name: Build materialized site
        run: |
          set -euo pipefail
          site_dir="dist/pages"
          tag="$(node -e "const manifest = require('./assets/press-system.json'); const version = String(manifest.version || '').trim(); const tag = String(manifest.tag || '').trim(); if (!/^\\d+\\.\\d+\\.\\d+$/.test(version) || tag !== \`v\${version}\`) { throw new Error('assets/press-system.json must declare matching version and tag'); } process.stdout.write(tag);")"
          bash scripts/build-pages-artifact.sh "${site_dir}" "${tag}"
          package_dir="$(mktemp -d)"
          archive_path="$(bash scripts/package-system-release.sh "${tag}" "${package_dir}")"
          node scripts/verify-pages-artifact.mjs \
            --pages-root "${site_dir}" \
            --system-archive "${archive_path}" \
            --tag "${tag}"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/pages
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
