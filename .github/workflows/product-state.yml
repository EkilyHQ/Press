name: Product State

on:
  workflow_dispatch:
    inputs:
      require_converged:
        description: Fail unless desired and observed product state have fully converged.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 * * * *'
  workflow_run:
    workflows:
      - System Release
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release-artifacts
  cancel-in-progress: false

jobs:
  refresh:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate product-state ledger
        id: generate
        env:
          REQUIRE_CONVERGED: ${{ github.event_name == 'workflow_run' && 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.require_converged == 'true' && 'true' || 'false' }}
          PRODUCT_STATE_CONVERGENCE_ATTEMPTS: ${{ vars.PRODUCT_STATE_CONVERGENCE_ATTEMPTS || '30' }}
          PRODUCT_STATE_CONVERGENCE_INTERVAL_SECONDS: ${{ vars.PRODUCT_STATE_CONVERGENCE_INTERVAL_SECONDS || '60' }}
        run: |
          set -euo pipefail
          mkdir -p dist

          attempts=1
          interval=0
          if [[ "${REQUIRE_CONVERGED}" == "true" ]]; then
            attempts="${PRODUCT_STATE_CONVERGENCE_ATTEMPTS}"
            interval="${PRODUCT_STATE_CONVERGENCE_INTERVAL_SECONDS}"
          fi
          if ! [[ "${attempts}" =~ ^[0-9]+$ ]] || (( attempts < 1 )); then
            attempts=30
          fi
          if ! [[ "${interval}" =~ ^[0-9]+$ ]]; then
            interval=60
          fi

          converged=false
          for (( attempt = 1; attempt <= attempts; attempt += 1 )); do
            node scripts/product-state-ledger.js \
              --out dist/product-state.json \
              --allow-pending \
              --allow-unknown
            node scripts/product-state-dashboard.js \
              --state dist/product-state.json \
              --out dist/product-state.html

            if node scripts/product-state-ledger.js \
              --state dist/product-state.json \
              --check \
              --require-converged \
              --quiet 2>dist/product-state-check.log; then
              converged=true
              break
            fi

            cat dist/product-state-check.log >&2
            if [[ "${REQUIRE_CONVERGED}" != "true" ]]; then
              break
            fi
            if (( attempt < attempts )); then
              echo "::notice title=Product state pending::Attempt ${attempt}/${attempts} has not converged; retrying in ${interval}s."
              sleep "${interval}"
            fi
          done

          echo "converged=${converged}" >> "${GITHUB_OUTPUT}"

      - name: Publish product-state ledger
        run: |
          set -euo pipefail
          artifact_branch="release-artifacts"
          product_state_path="product-state.json"
          product_state_dashboard_path="product-state.html"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${artifact_branch}" || true
          rm -rf artifacts-worktree
          if git show-ref --verify --quiet "refs/remotes/origin/${artifact_branch}"; then
            git worktree add artifacts-worktree "origin/${artifact_branch}"
          else
            git worktree add --detach artifacts-worktree
            git -C artifacts-worktree checkout --orphan "${artifact_branch}"
            git -C artifacts-worktree rm -rf . >/dev/null 2>&1 || true
          fi

          cp dist/product-state.json "artifacts-worktree/${product_state_path}"
          cp dist/product-state.html "artifacts-worktree/${product_state_dashboard_path}"
          git -C artifacts-worktree add "${product_state_path}" "${product_state_dashboard_path}"
          if git -C artifacts-worktree diff --cached --quiet; then
            echo "Product-state ledger and dashboard are already current."
          else
            git -C artifacts-worktree commit -m "Refresh product state ledger"
            git -C artifacts-worktree push origin "HEAD:${artifact_branch}"
          fi
          git worktree remove artifacts-worktree --force

      - name: Evaluate product-state ledger
        env:
          REQUIRE_CONVERGED: ${{ github.event_name == 'workflow_run' && 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.require_converged == 'true' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          check_args=(
            --state dist/product-state.json
            --check
            --quiet
          )
          if [[ "${REQUIRE_CONVERGED}" == "true" ]]; then
            check_args+=(--require-converged)
          else
            check_args+=(--allow-pending --allow-unknown)
          fi
          node scripts/product-state-ledger.js "${check_args[@]}"
